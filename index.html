<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Web Search</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
        }
        .search-container {
            width: 100%;
            max-width: 500px;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 600;
            text-align: center;
        }
        .search-box {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #334155;
            background: #0f172a;
            color: #fff;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #3b82f6;
        }
        button {
            padding: 12px 24px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
        }
        button:hover {
            background-color: #2563eb;
        }

        /* --- PROMOTION STYLES --- */
        .promo-banner {
            display: none;
            margin-top: 20px;
            padding: 16px;
            background: linear-gradient(135deg, #1e3a8a, #1d4ed8);
            border-left: 4px solid #60a5fa;
            border-radius: 6px;
            animation: fadeIn 0.3s ease-out;
        }
        .promo-banner h3 {
            margin: 0 0 4px 0;
            font-size: 16px;
            color: #fff;
        }
        .promo-banner p {
            margin: 0 12px 0 0;
            font-size: 14px;
            color: #bfdbfe;
        }
        .promo-link {
            display: inline-block;
            margin-top: 10px;
            color: #fff;
            text-decoration: underline;
            font-weight: bold;
            font-size: 14px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="search-container">
    <h2>Search the Web</h2>
    
    <form id="globalSearchForm" action="https://duckduckgo.com/" method="get" target="_blank">
        <div class="search-box">
            <input type="text" name="q" id="searchQuery" placeholder="Search or type a game name..." autocomplete="off" required>
            <button type="submit">Search</button>
        </div>
    </form>

    <div id="promoBanner" class="promo-banner">
        <h3 id="promoTitle">Featured Game</h3>
        <p id="promoDesc">Play it directly inside your browser window right now!</p>
        <a id="promoHref" class="promo-link" href="#" target="_blank">Play Now →</a>
    </div>
</div>

<script>
const searchInput = document.getElementById('searchQuery');
const promoBanner = document.getElementById('promoBanner');
const promoTitle = document.getElementById('promoTitle');
const promoDesc = document.getElementById('promoDesc');
const promoHref = document.getElementById('promoHref');

// Your custom links and keyword triggers (unchanged)
const promotions = [
    {
        keywords: ["cut the rope", "cut", "rope", "om nom"],
        title: "🟢 Play Cut the Rope",
        desc: "Cut strings, collect stars, and feed Om Nom in this classic physics puzzle game!",
        url: "https://cutherope.vercel.app"
    },
    {
        keywords: ["crazy cattle 3d", "crazy", "cattle", "3d", "cow"],
        title: "🐮 Play Crazy Cattle 3D",
        desc: "Run wild, smash obstacles, and control the herd in a fully simulated 3D setting.",
        url: "https://crazy-cattl-e-3-d.vercel.app/"
    },
    {
        keywords: ["bloxorz", "block", "hole", "roll"],
        title: "🧱 Play Bloxorz",
        desc: "Test your spatial skills! Navigate the metallic block through the grid into the target square.",
        url: "https://blox-orz.vercel.app/"
    }
];

// Scan input as they type to instantly display the recommendation
searchInput.addEventListener('input', function() {
    const val = this.value.toLowerCase().trim();
    let matchFound = false;

    if (val.length > 1) {
        for (const promo of promotions) {
            // Check if input matches any of our keywords
            const match = promo.keywords.some(keyword => val.includes(keyword));
            if (match) {
                promoTitle.innerText = promo.title;
                promoDesc.innerText = promo.desc;
                promoHref.href = promo.url;
                promoBanner.style.display = "block";
                matchFound = true;
                break;
            }
        }
    }

    if (!matchFound) {
        promoBanner.style.display = "none";
    }
});

// If the page was opened with ?q=... forward the same query to DuckDuckGo.
(function forwardQueryToDuckDuckGo() {
  try {
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    if (q !== null && q.trim() !== '') {
      const decoded = decodeURIComponent(q.replace(/\+/g, ' '));
      const ddgUrl = new URL('https://duckduckgo.com/');
      ddgUrl.searchParams.set('q', decoded);
      window.location.replace(ddgUrl.toString());
    }
  } catch (e) {
    console.error('Redirect to DuckDuckGo failed:', e);
  }
})();
</script>

</body>
</html>
